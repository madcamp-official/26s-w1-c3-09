# HTTP(80): https로 영구 리다이렉트만 담당
server {
    listen 80;
    return 301 https://$host$request_uri;
}

# HTTPS(443): 실제 서비스
# 인증서는 EC2 호스트의 /home/ec2-user/letsencrypt 를 컨테이너 /etc/letsencrypt 로 마운트
# (docker-compose-prod.yml frontend.volumes 참고)
server {
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/madfinder.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/madfinder.site/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅: /tierlist, /games/123 같은 경로로 새로고침해도 index.html 반환
    location / {
        try_files $uri /index.html;
    }

    # /api는 백엔드 컨테이너로 프록시 (same-origin이 되므로 CORS 불필요)
    # "server"는 docker-compose-prod.yml의 서비스 이름
    location /api/ {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
