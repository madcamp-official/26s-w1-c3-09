# 로컬 개발 보조용: MySQL만 컨테이너로 띄운다 (서버는 bootRun, 프론트는 vite로 로컬 실행)
# 로컬에 MySQL을 직접 설치해 쓰고 있다면 이 파일은 안 써도 됨 (README 1-a 경로)
#
# 사용법:  docker compose up -d
#   - 루트 .env의 DB_PASSWORD를 root 비밀번호로 사용
#   - 호스트 포트 3307 (로컬 설치 MySQL 3306과 충돌 방지) → .env에 DB_PORT=3307 설정
#   - 최초 기동 시 docs/KJH/db-schema.sql 자동 적용, 데이터는 볼륨에 영속

services:
  mysql:
    image: mysql:8.4
    container_name: madfinder-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?루트 .env에 DB_PASSWORD를 설정하세요}
      MYSQL_DATABASE: roblox_rec
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/KJH/db-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  mysql-data:
