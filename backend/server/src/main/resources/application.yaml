server:
  # nginx가 붙여주는 X-Forwarded-Proto/For를 신뢰 — 스킴을 https로 올바르게 인식
  # (없으면 same-origin PUT/POST가 cross-origin으로 오판돼 CORS 403 — WebConfig 주석 참고)
  forward-headers-strategy: framework

spring:
  application:
    name: server
  config:
    # 루트 .env 자동 로드 (환경변수가 이미 있으면 그쪽이 우선)
    # IntelliJ 실행(cwd=레포 루트)은 첫 줄, gradlew bootRun(cwd=backend/server)은 둘째 줄이 잡음
    import:
      - optional:file:.env[.properties]
      - optional:file:../../.env[.properties]
  datasource:
    # DB_PORT 기본 3306 — 개발용 docker-compose.yml(호스트 3307)을 쓸 때만 .env에 DB_PORT=3307
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/roblox_rec
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

# server·batch 공용 설정 디렉토리 (rate_governance.json, scoring.json)
# bootRun 기준 backend/server → ../config = backend/config
madfinder:
  config-dir: ${CONFIG_DIR:../config}

# GOOGLE_API_KEY는 YoutubeApiClient가 환경변수에서 직접 읽음 (@Value "${GOOGLE_API_KEY:}")
# — 여기 별도 키로 매핑하지 않음 (과거 google.api.key 블록은 아무도 안 읽던 죽은 설정이라 제거)