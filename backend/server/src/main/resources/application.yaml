spring:
  application:
    name: server
  config:
    # 루트 .env 자동 로드 (환경변수가 이미 있으면 그쪽이 우선)
    # IntelliJ 실행(cwd=레포 루트)은 첫 줄, gradlew bootRun(cwd=backend/server)은 둘째 줄이 잡음
    import:
      - optional:file:.env[.properties]
      - optional:file:../../.env[.properties]
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/roblox_rec
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

# server·batch 공용 설정 디렉토리 (rate_governance.json, scoring.json)
# bootRun 기준 backend/server → ../config = backend/config
madfinder:
  config-dir: ${CONFIG_DIR:../config}

google:
  api:
    key: ${GOOGLE_API_KEY}  # 시스템 환경 변수나 인텔리제이 Run Configuration에서 값을 주입받도록 설정