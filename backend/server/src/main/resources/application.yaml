spring:
  application:
    name: server
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/roblox_rec
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

# server·batch 공용 설정 디렉토리 (rate_governance.json, scoring.json)
# bootRun 기준 backend/server → ../config = backend/config
madfinder:
  config-dir: ${CONFIG_DIR:../config}
