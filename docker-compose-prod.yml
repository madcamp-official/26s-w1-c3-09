# EC2 배포용 전체 스택
#
# EC2에서:
#   1) git clone/pull 후 루트에 .env 생성 (DB_PASSWORD 필수, GOOGLE_API_KEY 선택)
#   2) docker compose -f docker-compose-prod.yml up -d --build
#   3) http://<EC2 퍼블릭 IP>/ 접속 (보안그룹에서 80 포트 오픈 필요)
#
# 컨테이너 간 통신은 내부 네트워크의 서비스 이름으로:
#   frontend(nginx) --/api--> server:8080 --> mysql:3306
#   batch ----------------------------------> mysql:3306
#
# batch는 24시간 상시 수집 루프 (기숙사 무한루프와 동일: b1→b2→b4 반복).
# 유저 몫은 rate_governance.json 레인 floor가 보장하므로 상시 가동해도 실시간 응답 안전.
# 구버전의 "호스트 cron 잡 단위 실행"은 폐기 — deploy.yml이 기존 batch cron 항목을 제거함.

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?루트 .env에 DB_PASSWORD를 설정하세요}
      MYSQL_DATABASE: roblox_rec
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/schema/db-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 12
    # 호스트로 포트를 열지 않음 — DB는 내부 네트워크 전용 (디버깅 필요 시 아래 주석 해제)
    # ports:
    #   - "3307:3306"

  server:
    build:
      context: ./backend            # backend/config를 이미지에 담기 위해 컨텍스트가 backend/
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: mysql                # 컨테이너 서비스 이름으로 접속
      DB_PORT: "3306"               # 내부 포트 (호스트 매핑 3307과 무관)
      DB_PASSWORD: ${DB_PASSWORD:?}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}   # 없으면 쇼츠 검색만 꺼짐 (서버는 정상)
    depends_on:
      mysql:
        condition: service_healthy  # 스키마 적용·기동 완료 후에 서버 시작
    # 외부 노출 불필요 (nginx가 내부에서 접근) — 직접 API 디버깅 시 주석 해제
    # ports:
    #   - "8080:8080"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"                     # https로 301 리다이렉트
      - "443:443"
    volumes:
      # Let's Encrypt 인증서 — EC2 호스트에서 certbot(standalone)으로 발급·갱신, 컨테이너는 읽기만
      - /home/ec2-user/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - server

  batch:
    build:
      context: ./backend            # server와 동일 — backend/config를 이미지에 담기 위함
      dockerfile: batch/Dockerfile
    restart: unless-stopped         # 죽어도 자동 재기동, 재부팅에도 살아남음 (24시간 수집)
    # 기숙사 PowerShell 무한루프와 동일한 순서·의미 (잡 하나 실패해도 루프 계속)
    command: ["sh", "-c", "while true; do python -m jobs.b1_charts; python -m jobs.b2_queue_consumer; python -m jobs.b3_rec_cache; python -m jobs.b4_fan_collector; done"]
    environment:
      PYTHONUNBUFFERED: "1"         # docker logs로 실시간 확인
      DB_HOST: mysql                # 컨테이너 서비스 이름으로 접속
      DB_PORT: "3306"
      DB_PASSWORD: ${DB_PASSWORD:?}
    depends_on:
      mysql:
        condition: service_healthy  # DB 기동 완료 후에만 잡 실행

volumes:
  mysql-data:
