# main에 push(=PR 머지)되면 EC2에 자동 배포 (방식: ssh 접속 → git pull → compose 재빌드)
#
# 필요한 저장소 Secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST     EC2 퍼블릭 IP 또는 도메인 (Elastic IP 권장 — 재시작해도 안 바뀜)
#   EC2_USER     ssh 계정 (Amazon Linux면 ec2-user)
#   EC2_SSH_KEY  ssh 개인키 전문 (.pem 파일 내용 그대로)
#
# 주의: EC2 보안그룹 22번 포트가 GitHub Actions 러너(외부 IP)에서 접근 가능해야 함.

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼

concurrency:
  group: deploy           # 연속 머지 시 배포가 겹치지 않게 직렬화
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: EC2 접속 → pull + 재빌드
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m        # Gradle 첫 빌드가 오래 걸릴 수 있음
          script: |
            set -e
            cd ~/26s-w1-c3-09
            git fetch origin main
            git reset --hard origin/main   # EC2 쪽 임의 수정보다 origin이 항상 기준
            # 구버전 잔재 제거: batch를 잡 단위로 돌리던 호스트 cron 항목 (이제 상시 루프 컨테이너)
            ( crontab -l 2>/dev/null | grep -v "jobs\.b" | crontab - ) || true
            docker compose -f docker-compose-prod.yml up -d --build   # batch(24시간 루프) 포함 전체 기동
            docker image prune -f          # 재빌드로 생긴 옛 레이어 정리 (디스크 절약)

      - name: 배포 확인 (health check)
        run: |
          sleep 40   # Spring 부팅 대기
          # EC2_HOST가 IP라 인증서(도메인 발급)와 안 맞음 → https는 도메인으로 직접 확인
          curl -fsS "https://madfinder.site/api/health"
          # http→https 리다이렉트 동작 확인 (301)
          curl -fsSI "http://madfinder.site" | head -1 | grep -q "301"
